<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinyin Pirate Treasure Match</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #e0f7fa;
            padding: 10px;
            box-sizing: border-box;
        }
        #game-container {
            background-color: white;
            border-radius: 15px;
            padding: 12px 20px 12px;
            width: calc(100% - 8px);
            max-width: none;
            margin: 0 auto;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border: 4px solid #00acc1;
            height: calc(100vh - 20px - 8px);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #header {
            display: flex;
            align-items: baseline;
            gap: 16px;
            flex-shrink: 0;
            margin-bottom: 10px;
        }
        h1 { color: #ff8f00; font-size: 22px; margin: 0; white-space: nowrap; }
        .subtitle { color: #00838f; font-size: 16px; margin: 0; }

        /* ── Menu ── */
        #menu-area {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 10px;
            flex: 1;
            overflow-y: auto;
            align-content: start;
        }
        .lesson-group {
            display: flex;
            flex-direction: column;
            border: 3px solid #00acc1;
            border-radius: 12px;
            overflow: hidden;
        }
        .lesson-group-label {
            background-color: #00838f;
            color: white;
            font-weight: bold;
            font-size: 15px;
            padding: 6px 12px;
            text-align: left;
        }
        .lesson-group-btns { display: flex; }
        .lesson-btn {
            flex: 1;
            padding: 12px 8px;
            font-size: 15px;
            font-family: inherit;
            border: none;
            color: #004d40;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lesson-btn-solo { background-color: #4dd0e1; border-right: 2px solid #00acc1; }
        .lesson-btn-solo:hover { background-color: #26c6da; }
        .lesson-btn-cumulative { background-color: #80cbc4; }
        .lesson-btn-cumulative:hover { background-color: #4db6ac; }
        .lesson-btn-cumulative:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── Game Area ── */
        #game-area {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            gap: 8px;
        }

        /* Status Bar */
        #status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 6px 12px;
            background-color: #f9fbe7;
            border-radius: 10px;
            border: 2px solid #c5e1a5;
            font-size: 18px;
            font-weight: bold;
            flex-shrink: 0;
        }
        #coins-display { color: #00838f; }
        #steps-display { color: #546e7a; font-size: 15px; }
        #status-bar .spacer { flex: 1; }
        #back-btn {
            background-color: #ff7043;
            border: 2px solid #d84315;
            color: white;
            font-weight: bold;
            padding: 6px 14px;
            font-size: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
        }
        #back-btn:hover { background-color: #f4511e; }

        /* Two-column game layout */
        #game-columns {
            display: flex;
            gap: 16px;
            flex: 1;
            min-height: 0;
        }

        /* Left column: grid + compass */
        #game-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            flex: 1;
        }

        #grid-scroll {
            overflow: auto;
        }

        #grid-container {
            display: grid;
            gap: 0;
            padding: 1px;
            background: linear-gradient(135deg, #0277bd 0%, #039be5 50%, #29b6f6 100%);
            border-radius: 10px;
            overflow: hidden;
            grid-auto-rows: var(--cell-size, 54px);
        }

        .grid-cell {
            width: var(--cell-size, 54px);
            height: var(--cell-size, 54px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--cell-font, 28px);
            border-radius: 0;
            border: 1px solid rgba(2, 119, 189, 0.45);
            box-sizing: border-box;
            transition: transform 0.15s;
        }
        .cell-water   { background: transparent; }
        .cell-start   { background: transparent; border-color: rgba(2,119,189,0.45); }
        .cell-port    { background: transparent; border-color: rgba(2,119,189,0.45); }
        .cell-island  { background: transparent; border-color: rgba(2,119,189,0.45); }
        .cell-monster { background: transparent; border-color: rgba(2,119,189,0.45); }
        .cell-ship    {
            background: rgba(255,255,255,0.18);
            border-color: rgba(2,119,189,0.45);
            box-shadow: inset 0 0 6px rgba(255,255,255,0.2);
            transform: scale(1.05);
            z-index: 1;
        }
        @keyframes ship-bob {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-7px); }
        }
        .ship-emoji    { display: inline-block; animation: ship-bob 1.4s ease-in-out infinite; }
        .creature-emoji { display: inline-block; animation: ship-bob 2.1s ease-in-out infinite; }

        @keyframes ship-hit {
            0%   { transform: rotate(0deg) scale(1); }
            12%  { transform: translate(-12px, 7px) rotate(-45deg) scale(1.5); }
            28%  { transform: translate(11px, -9px) rotate(40deg) scale(0.75); }
            44%  { transform: translate(-8px, 10px) rotate(-30deg) scale(1.3); }
            60%  { transform: translate(6px, -5px) rotate(20deg) scale(1.0); }
            75%  { transform: translate(-3px, 3px) rotate(-12deg); }
            90%  { transform: translate(1px, -1px) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        }
        .ship-emoji.ship-hit { animation: ship-hit 0.65s ease-out forwards !important; }

        @keyframes fw-burst {
            0%   { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
        }
        .fw-particle {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: fw-burst 0.7s ease-out forwards;
        }
        .cell-depleted { opacity: 0.55; }

        .grid-cell { position: relative; }
        .parrot-on-island, .monkey-on-island {
            position: absolute;
            top: 2px; right: 2px;
            font-size: 17px;
            line-height: 1;
            pointer-events: none;
        }

        #parrot-popup {
            position: fixed;
            inset: 0;
            background: rgba(0,0,50,0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        @keyframes pop-in {
            from { transform: scale(0.4) rotate(-6deg); opacity: 0; }
            to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
        }
        #parrot-popup-inner {
            background: white;
            border-radius: 20px;
            border: 4px solid #00acc1;
            padding: 28px 36px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            animation: pop-in 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 16px 50px rgba(0,0,0,0.5);
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        .parrot-popup-btn {
            margin-top: 16px;
            padding: 10px 24px;
            font-size: 16px;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            font-weight: bold;
            background: #ffca28;
            border: 2px solid #ff8f00;
            border-radius: 12px;
            cursor: pointer;
            color: #004d40;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .parrot-popup-btn:hover { background: #ffb300; }

        #monkey-popup {
            position: fixed;
            inset: 0;
            background: rgba(20,10,0,0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        #monkey-popup-inner {
            background: #fffde7;
            border-radius: 20px;
            border: 4px solid #8d6e63;
            padding: 28px 36px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            animation: pop-in 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 16px 50px rgba(0,0,0,0.5);
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        .monkey-popup-btn {
            margin-top: 16px;
            padding: 10px 24px;
            font-size: 16px;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            font-weight: bold;
            background: #a5d6a7;
            border: 2px solid #388e3c;
            border-radius: 12px;
            cursor: pointer;
            color: #1b5e20;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .monkey-popup-btn:hover { background: #81c784; }

        /* Compass */
        #compass {
            display: grid;
            grid-template-columns: repeat(3, 40px);
            grid-template-rows: repeat(3, 40px);
            gap: 4px;
            flex-shrink: 0;
        }
        .compass-btn {
            font-size: 20px;
            background: #26c6da;
            border: 2px solid #00838f;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            padding: 0;
            font-family: inherit;
        }
        .compass-btn:hover:not(:disabled) {
            background: #00acc1;
            transform: scale(1.12);
        }
        .compass-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
        .compass-center {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #e0f7fa;
            border-radius: 50%;
            border: 2px solid #b2ebf2;
        }

        /* Right column: question + options + feedback */
        #game-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        .move-hint {
            font-size: 14px;
            color: #00838f;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .legend {
            font-size: 13px;
            color: #546e7a;
            margin-top: 6px;
        }
        .q-text {
            font-size: 20px;
            color: #37474f;
            margin-top: 4px;
        }

        #question-area {
            flex-shrink: 0;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            flex: 1;
            align-content: stretch;
        }
        .opt-btn {
            padding: 0;
            font-size: 17px;
            font-family: inherit;
            background-color: #ffca28;
            border: 2px solid #ff8f00;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
        }
        .opt-btn:hover { background-color: #ffb300; }
        .opt-btn:active { transform: scale(0.98); }
        .opt-btn:disabled { opacity: 0.8; cursor: not-allowed; transform: none; }

        #feedback {
            font-size: 18px;
            font-weight: bold;
            min-height: 24px;
            flex-shrink: 0;
        }

        #character-area {
            font-size: 52px;
            line-height: 1;
            text-align: center;
            min-height: 56px;
            flex-shrink: 0;
        }

        @keyframes pirate-dance {
            0%   { transform: translateY(0) rotate(0deg); }
            25%  { transform: translateY(-16px) rotate(-15deg) scale(1.1); }
            50%  { transform: translateY(0) rotate(0deg) scale(1.1); }
            75%  { transform: translateY(-16px) rotate(15deg) scale(1.1); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .anim-dance { animation: pirate-dance 0.6s ease-in-out infinite; }

        @keyframes dizzy-drop {
            0%   { transform: rotate(0deg) translateY(0) scale(1); opacity: 1; }
            50%  { transform: rotate(180deg) translateY(-16px) scale(1.2); opacity: 1; }
            100% { transform: rotate(360deg) translateY(50px) scale(0.5); opacity: 0; }
        }
        .anim-dizzy { animation: dizzy-drop 1s ease-in-out forwards; }

        #error-msg { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <h1>🏴‍☠️ Pinyin Pirate Match 🏴‍☠️</h1>
        <div class="subtitle" id="subtitle">Select your map to start the voyage!</div>
    </div>

    <div id="error-msg"></div>

    <!-- Main Menu -->
    <div id="menu-area">Loading lessons...</div>

    <!-- Gameplay -->
    <div id="game-area">
        <div id="status-bar">
            <div id="coins-display">🪙 <span id="score-count">0</span></div>
            <div id="steps-display">⚓ <span id="step-count">0</span> moves</div>
            <div class="spacer"></div>
            <button id="back-btn" onclick="returnToMenu()">🗺️ Menu</button>
        </div>

        <div id="game-columns">
            <!-- Grid + Compass -->
            <div id="game-left">
                <div id="grid-scroll">
                    <div id="grid-container"></div>
                </div>
                <div id="compass">
                    <div></div>
                    <button id="btn-up"    class="compass-btn" onclick="pickDirection(-1,0)">⬆️</button>
                    <div></div>
                    <button id="btn-left"  class="compass-btn" onclick="pickDirection(0,-1)">⬅️</button>
                    <div class="compass-center">🧭</div>
                    <button id="btn-right" class="compass-btn" onclick="pickDirection(0,1)">➡️</button>
                    <div></div>
                    <button id="btn-down"  class="compass-btn" onclick="pickDirection(1,0)">⬇️</button>
                    <div></div>
                </div>
            </div>

            <!-- Question Panel -->
            <div id="game-right">
                <div id="question-area"></div>
                <div id="options-area" class="options"></div>
                <div id="feedback"></div>
                <div id="character-area">🏴‍☠️</div>
            </div>
        </div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
