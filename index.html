<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinyin Pirate Treasure Match</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #e0f7fa;
            padding: 10px;
            box-sizing: border-box;
        }
        #game-container {
            background-color: white;
            border-radius: 15px;
            padding: 12px 20px 12px;
            width: calc(100% - 8px);
            max-width: none;
            margin: 0 auto;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border: 4px solid #00acc1;
            height: calc(100vh - 20px - 8px);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #header {
            display: flex;
            align-items: baseline;
            gap: 16px;
            flex-shrink: 0;
            margin-bottom: 10px;
        }
        h1 { color: #ff8f00; font-size: 22px; margin: 0; white-space: nowrap; }
        .subtitle { color: #00838f; font-size: 16px; margin: 0; }

        /* ── Menu ── */
        #menu-area {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 10px;
            flex: 1;
            overflow-y: auto;
            align-content: start;
        }
        .lesson-group {
            display: flex;
            flex-direction: column;
            border: 3px solid #00acc1;
            border-radius: 12px;
            overflow: hidden;
        }
        .lesson-group-label {
            background-color: #00838f;
            color: white;
            font-weight: bold;
            font-size: 15px;
            padding: 6px 12px;
            text-align: left;
        }
        .lesson-group-btns { display: flex; }
        .lesson-btn {
            flex: 1;
            padding: 12px 8px;
            font-size: 15px;
            font-family: inherit;
            border: none;
            color: #004d40;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lesson-btn-solo { background-color: #4dd0e1; border-right: 2px solid #00acc1; }
        .lesson-btn-solo:hover { background-color: #26c6da; }
        .lesson-btn-cumulative { background-color: #80cbc4; }
        .lesson-btn-cumulative:hover { background-color: #4db6ac; }
        .lesson-btn-cumulative:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── Game Area ── */
        #game-area {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            gap: 8px;
        }

        /* Status Bar */
        #status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 6px 12px;
            background-color: #f9fbe7;
            border-radius: 10px;
            border: 2px solid #c5e1a5;
            font-size: 18px;
            font-weight: bold;
            flex-shrink: 0;
        }
        #coins-display { color: #00838f; }
        #steps-display { color: #546e7a; font-size: 15px; }
        #status-bar .spacer { flex: 1; }
        #back-btn {
            background-color: #ff7043;
            border: 2px solid #d84315;
            color: white;
            font-weight: bold;
            padding: 6px 14px;
            font-size: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
        }
        #back-btn:hover { background-color: #f4511e; }

        /* Two-column game layout */
        #game-columns {
            display: flex;
            gap: 16px;
            flex: 1;
            min-height: 0;
        }

        /* Left column: grid + compass */
        #game-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        #grid-scroll {
            overflow: auto;
            flex: 1;
            min-height: 0;
        }

        #grid-container {
            display: grid;
            gap: 3px;
            padding: 3px;
        }

        .grid-cell {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            border-radius: 6px;
            border: 1px solid rgba(0,80,120,0.15);
            box-sizing: border-box;
            transition: transform 0.15s;
        }
        .cell-water   { background: linear-gradient(135deg, #81d4fa, #4fc3f7); }
        .cell-start   { background: #a5d6a7; border: 2px solid #388e3c !important; }
        .cell-port    { background: #ffd54f; border: 2px solid #ff8f00 !important; }
        .cell-island  { background: #ffe082; border: 1px solid #f9a825 !important; }
        .cell-monster { background: #ef9a9a; border: 1px solid #c62828 !important; }
        .cell-ship    {
            background: #039be5;
            border: 2px solid #01579b !important;
            box-shadow: 0 0 6px rgba(1,87,155,0.5);
            transform: scale(1.05);
            z-index: 1;
        }
        .cell-depleted { opacity: 0.55; }

        /* Compass */
        #compass {
            display: grid;
            grid-template-columns: repeat(3, 40px);
            grid-template-rows: repeat(3, 40px);
            gap: 4px;
            flex-shrink: 0;
        }
        .compass-btn {
            font-size: 20px;
            background: #26c6da;
            border: 2px solid #00838f;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            padding: 0;
            font-family: inherit;
        }
        .compass-btn:hover:not(:disabled) {
            background: #00acc1;
            transform: scale(1.12);
        }
        .compass-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
        .compass-center {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #e0f7fa;
            border-radius: 50%;
            border: 2px solid #b2ebf2;
        }

        /* Right column: question + options + feedback */
        #game-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        .move-hint {
            font-size: 14px;
            color: #00838f;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .legend {
            font-size: 13px;
            color: #546e7a;
            margin-top: 6px;
        }
        .q-text {
            font-size: 20px;
            color: #37474f;
            margin-top: 4px;
        }

        #question-area {
            flex-shrink: 0;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            flex: 1;
            align-content: stretch;
        }
        .opt-btn {
            padding: 0;
            font-size: 17px;
            font-family: inherit;
            background-color: #ffca28;
            border: 2px solid #ff8f00;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
        }
        .opt-btn:hover { background-color: #ffb300; }
        .opt-btn:active { transform: scale(0.98); }
        .opt-btn:disabled { opacity: 0.8; cursor: not-allowed; transform: none; }

        #feedback {
            font-size: 18px;
            font-weight: bold;
            min-height: 24px;
            flex-shrink: 0;
        }

        #character-area {
            font-size: 52px;
            line-height: 1;
            text-align: center;
            min-height: 56px;
            flex-shrink: 0;
        }

        @keyframes pirate-dance {
            0%   { transform: translateY(0) rotate(0deg); }
            25%  { transform: translateY(-16px) rotate(-15deg) scale(1.1); }
            50%  { transform: translateY(0) rotate(0deg) scale(1.1); }
            75%  { transform: translateY(-16px) rotate(15deg) scale(1.1); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .anim-dance { animation: pirate-dance 0.6s ease-in-out infinite; }

        @keyframes dizzy-drop {
            0%   { transform: rotate(0deg) translateY(0) scale(1); opacity: 1; }
            50%  { transform: rotate(180deg) translateY(-16px) scale(1.2); opacity: 1; }
            100% { transform: rotate(360deg) translateY(50px) scale(0.5); opacity: 0; }
        }
        .anim-dizzy { animation: dizzy-drop 1s ease-in-out forwards; }

        #error-msg { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <h1>🏴‍☠️ Pinyin Pirate Match 🏴‍☠️</h1>
        <div class="subtitle" id="subtitle">Select your map to start the voyage!</div>
    </div>

    <div id="error-msg"></div>

    <!-- Main Menu -->
    <div id="menu-area">Loading lessons...</div>

    <!-- Gameplay -->
    <div id="game-area">
        <div id="status-bar">
            <div id="coins-display">🪙 <span id="score-count">0</span></div>
            <div id="steps-display">⚓ <span id="step-count">0</span> moves</div>
            <div class="spacer"></div>
            <button id="back-btn" onclick="returnToMenu()">🗺️ Menu</button>
        </div>

        <div id="game-columns">
            <!-- Grid + Compass -->
            <div id="game-left">
                <div id="grid-scroll">
                    <div id="grid-container"></div>
                </div>
                <div id="compass">
                    <div></div>
                    <button id="btn-up"    class="compass-btn" onclick="pickDirection(-1,0)">⬆️</button>
                    <div></div>
                    <button id="btn-left"  class="compass-btn" onclick="pickDirection(0,-1)">⬅️</button>
                    <div class="compass-center">🧭</div>
                    <button id="btn-right" class="compass-btn" onclick="pickDirection(0,1)">➡️</button>
                    <div></div>
                    <button id="btn-down"  class="compass-btn" onclick="pickDirection(1,0)">⬇️</button>
                    <div></div>
                </div>
            </div>

            <!-- Question Panel -->
            <div id="game-right">
                <div id="question-area"></div>
                <div id="options-area" class="options"></div>
                <div id="feedback"></div>
                <div id="character-area">🏴‍☠️</div>
            </div>
        </div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
